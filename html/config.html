<section class="settings">
  <h2 class="settings-heading">設計書エクスポート</h2>
  <p class="settings-description">
    このプラグインは、対象アプリの設定情報を取得し、HTML形式の設計書としてダウンロードします。
  </p>

  <form id="plugin-form" class="settings-form">
    <h3 class="section-heading">出力設定</h3>

    <div class="kintoneplugin-row">
      <label class="kintoneplugin-label" for="document-title-prefix">
        設計書タイトル
      </label>
      <div class="kintoneplugin-input-outer">
        <input
          class="kintoneplugin-input-text"
          id="document-title-prefix"
          type="text"
        />
        <p class="field-help">
          出力HTMLの見出しに表示するタイトルです。
        </p>
      </div>
    </div>

    <div class="kintoneplugin-row">
      <label class="kintoneplugin-label" for="output-file-prefix">
        出力ファイル名プレフィックス
      </label>
      <div class="kintoneplugin-input-outer">
        <input
          class="kintoneplugin-input-text"
          id="output-file-prefix"
          type="text"
        />
        <p class="field-help">
          実際のファイル名は、プレフィックス + アプリID + 日時で生成されます。
        </p>
      </div>
    </div>

    <div class="kintoneplugin-row">
      <label class="kintoneplugin-label" for="settings-scope">
        取得対象
      </label>
      <div class="kintoneplugin-input-outer">
        <select class="kintoneplugin-select" id="settings-scope">
          <option value="live">本番反映済み設定</option>
          <option value="preview">未反映を含むプレビュー設定</option>
        </select>
        <p class="field-help">
          プレビュー設定を選ぶと、アプリ更新前の設定を対象にします。
        </p>
      </div>
    </div>

    <div class="kintoneplugin-row">
      <div class="kintoneplugin-label">出力オプション</div>
      <div class="kintoneplugin-input-outer checkbox-list">
        <label class="kintoneplugin-input-checkbox-item">
          <input id="include-permissions" type="checkbox" />
          <span>権限設定を含める</span>
        </label>
        <label class="kintoneplugin-input-checkbox-item">
          <input id="include-notifications" type="checkbox" />
          <span>通知設定を含める</span>
        </label>
        <label class="kintoneplugin-input-checkbox-item">
          <input id="include-customization" type="checkbox" />
          <span>JavaScript/CSS/プラグイン設定を含める</span>
        </label>
        <label class="kintoneplugin-input-checkbox-item">
          <input id="include-admin-notes" type="checkbox" />
          <span>アプリ管理者メモを含める</span>
        </label>
        <label class="kintoneplugin-input-checkbox-item">
          <input id="include-raw-json" type="checkbox" />
          <span>各セクションに生データ (JSON) を添付する</span>
        </label>
      </div>
    </div>

    <div class="button-row">
      <button class="kintoneplugin-button-dialog-ok" type="submit">
        設定を保存
      </button>
      <button
        class="kintoneplugin-button-dialog-cancel"
        id="cancel-button"
        type="button"
      >
        キャンセル
      </button>
    </div>
  </form>

  <div class="export-panel">
    <h3 class="section-heading">設計書を出力</h3>
    <p class="export-description">
      保存済みの設定内容を使って、設計書を出力します。
      未保存の変更は出力に反映されません。
    </p>
    <p id="export-note" class="export-note">
      前回保存した設定で出力されます。設定を変更した場合は、先に「設定を保存」を実行してください。
    </p>
    <div class="button-row">
      <button
        class="kintoneplugin-button-dialog-ok"
        id="export-button"
        type="button"
      >
        保存済み設定で出力
      </button>
    </div>
  </div>

  <p id="status-message" class="status-message" hidden></p>
</section>
